<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Tsang Travel compass favicon">
  <defs>
    <linearGradient id="dial" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="needle-n" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="needle-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <!-- Outer dial -->
  <circle cx="32" cy="32" r="30" fill="url(#dial)" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Tick marks at 8 cardinal/intercardinal points -->
  <g stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round">
    <line x1="32" y1="6"  x2="32" y2="11"/>
    <line x1="32" y1="53" x2="32" y2="58"/>
    <line x1="6"  y1="32" x2="11" y2="32"/>
    <line x1="53" y1="32" x2="58" y2="32"/>
  </g>
  <g stroke="#64748b" stroke-width="1" stroke-linecap="round">
    <line x1="14" y1="14" x2="17.5" y2="17.5"/>
    <line x1="50" y1="14" x2="46.5" y2="17.5"/>
    <line x1="14" y1="50" x2="17.5" y2="46.5"/>
    <line x1="50" y1="50" x2="46.5" y2="46.5"/>
  </g>
  <!-- North needle (gold, pointing up) -->
  <polygon points="32,12 36,32 32,28 28,32" fill="url(#needle-n)"/>
  <!-- South needle (slate, pointing down) -->
  <polygon points="32,52 36,32 32,36 28,32" fill="url(#needle-s)"/>
  <!-- Center pivot -->
  <circle cx="32" cy="32" r="2.2" fill="#fbbf24" stroke="#0f172a" stroke-width="0.8"/>
  <!-- N label -->
  <text x="32" y="20" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="6" font-weight="700" fill="#fbbf24" letter-spacing="0.5">N</text>
</svg>
